name: Update Series

on:
  schedule:
    - cron: '0 */6 * * *'   # toutes les 6h
  workflow_dispatch:          # déclenchement manuel depuis GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python ─────────────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. Pipeline ───────────────────────────────────────────────────────────
      - name: s1 — Collect torrents from Nyaa
        run: python scripts/s1_collect.py

      - name: s2 — Enrich with .torrent file info
        run: python scripts/s2_enricher.py

      - name: s3 — Match torrents to series/episodes
        run: python scripts/s3_parse.py

      - name: s5 — Generate available.json
        run: python scripts/s5_available.py

      - name: s6 — Generate infohash map
        run: python scripts/gen_infohash_map.py

      # ── 4. Cleanup cache (ne pas committer) ───────────────────────────────────
      - name: Cleanup cache files
        if: always()
        run: |
          rm -rf data/api_cache/
          rm -rf data/torrent_cache/

      # ── 5. Commit & push ──────────────────────────────────────────────────────
      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add series/ available.json data/torrent_raw.json infohash_map.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update series — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push