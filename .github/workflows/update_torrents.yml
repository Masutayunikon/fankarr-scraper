name: Update Torrents

on:
  schedule:
    - cron: '0 */6 * * *'   # toutes les 6h
  workflow_dispatch:          # déclenchement manuel depuis GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python ─────────────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. Sauvegarder l'ancien JSON avant de le regénérer ───────────────────
      - name: Save old torrent_final.json
        run: |
          if [ -f data/torrent_final.json ]; then
            cp data/torrent_final.json data/torrent_final.old.json
          else
            echo "[]" > data/torrent_final.old.json
          fi

      # ── 4. Pipeline scraper ───────────────────────────────────────────────────
      - name: s1 — Collect torrents from Discord + Nyaa
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python scripts/s1_collect.py

      - name: s2 — Parse torrent names
        run: python scripts/s2_parse.py

      - name: s3 — Resolve Fankai IDs
        run: python scripts/s3_resolve.py

      - name: s4 — Enrich with .torrent file info
        run: python scripts/s4_enrich.py

      - name: s5 — Finalize episode resolution
        run: python scripts/s5_finalize.py

      # ── 5. Diff ───────────────────────────────────────────────────────────────
      - name: s6 — Compute diff
        id: diff
        run: |
          python scripts/s6_diff.py \
            --old data/torrent_final.old.json \
            --new data/torrent_final.json \
            --output pr_body.md
          echo "has_changes=$?" >> $GITHUB_OUTPUT
        # exit 0 = changements, exit 1 = rien → on continue sans erreur
        continue-on-error: true

      # ── 6. Ouvrir la PR si changements ───────────────────────────────────────
      - name: Create Pull Request
        if: steps.diff.outcome == 'success'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PAT }}
          branch: update/torrents-${{ github.run_number }}
          base: main
          title: "🎬 Mise à jour torrents — ${{ github.run_number }}"
          body-path: pr_body.md
          commit-message: "chore: update torrent_final.json"
          labels: |
            torrents
            automated
          add-paths: |
            data/torrent_final.json

      # ── 7. Cleanup ────────────────────────────────────────────────────────────
      - name: Cleanup temp files
        if: always()
        run: |
          rm -f data/torrent_final.old.json
          rm -f pr_body.md